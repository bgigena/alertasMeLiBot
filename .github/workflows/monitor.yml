name: Monitor MercadoLibre

on:
  schedule:
    # Corre cada 5 minutos (mínimo permitido por GitHub Actions)
    - cron: '*/5 * * * *'
  workflow_dispatch:
    # Permite ejecutarlo manualmente desde la pestaña Actions

permissions:
  contents: write

jobs:
  check-listings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Necesario para persistir cambios en seen_ids.json
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          SINGLE_RUN: "true"
          PERSISTENCE_DIR: "."
        run: python botMeLiAlertas.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_ids.json
          # Solo hacer commit si hubo cambios
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update seen items [skip ci]" && git push)
