app = "alertasmeli"
primary_region = "gru"

[build]
  builder = "paketobuildpacks/builder:base"

[env]
  PERSISTENCE_DIR = "/data"

[mounts]
  source = "data"
  destination = "/data"

[processes]
  app = "python botMeLiAlertas.py"

[[vm]]
  memory = "1gb"
  cpus = 1
  memory_mb = 1024
